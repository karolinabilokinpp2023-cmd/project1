name: CI/CD Pipeline

# Тригери для запуску пайплайну
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Job для збірки та тестування
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: my-calc

    steps:
      # Крок 1: Отримання коду з мого репозиторію
      - name: Checkout repository
        uses: actions/checkout@v4

      # Крок 2: Налаштування Node.js (версія 20)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Крок 3: Встановлення залежностей проекту
      - name: Install dependencies
        run: npm install

      # Крок 4: Перевірка якості коду (Linting)
      - name: Run ESLint
        run: npm run lint

      # Крок 5: Запуск автоматичних тестів
      - name: Run tests
        run: npm test -- --watchAll=false